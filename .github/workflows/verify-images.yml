name: Daily Image Verification

on:
  schedule:
    # 5 PM Argentina (UTC-3) -> 20:00 UTC
    - cron: '0 20 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  verify-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install requests google-genai beautifulsoup4 python-dotenv

    - name: Run verification script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        cd backend
        python verify_blog.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔧 Fix: Imágenes de blog verificadas y corregidas automáticamente" && git pull --rebase && git push)
